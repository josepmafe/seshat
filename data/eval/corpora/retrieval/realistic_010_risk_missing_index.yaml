corpus_id: risk-missing-index-reporting-mixed-pool
description: >
  Realistic mixed-pool positive: a risk about missing composite indexes causing reporting
  dashboard outages should surface the action item that directly addresses it and a
  related risk about dashboard staleness that shares the same observability failure mode.
  The pool mixes all four node types across database, alerting, and unrelated domains.

tags:
  tier: realistic
  source_type: risk
  polarity: positive
  difficulty: hard

query_node:
  id: missing-index-risk
  type: risk
  title: "Missing composite indexes may cause further reporting dashboard outages"
  description: "The composite index backfill on the events table is incomplete across historical partitions; the full scope is unknown and further incidents blocking the reporting dashboard are possible before the fix is applied."
  quote: "The underlying risk is still open — we don't know the full extent of the missing indexes yet and more incidents are possible before the fix lands."

candidate_nodes:
  # --- Strong positive: action item that directly addresses this risk ---
  - id: scan-partitions-action
    type: action_item
    title: "Scan partitions for missing indexes and draft remediation plan"
    description: "Lena will scan all events table partitions to identify missing composite index coverage and produce a remediation plan by Thursday."
    quote: "Lena, can you run that scan and put together a remediation plan by Thursday? Sure, I'll take that."

  # --- Weak positive: related risk about the same observability failure domain ---
  - id: dashboard-staleness-risk
    type: risk
    title: "Operational dashboards show stale metrics after scale-out events"
    description: "After horizontal scaling events, some dashboard panels continue to show pre-scale metrics for up to 10 minutes due to a caching issue in the metrics aggregator."
    quote: "Dashboards lie after we scale out, the numbers don't update for ages."

  # --- Hard negatives: same database/observability domain, not related to this risk ---
  - id: postgres-decision
    type: decision
    title: "Use PostgreSQL as the primary relational database"
    description: "PostgreSQL is selected as the sole relational persistence layer for all services."
    quote: "We're standardising on PostgreSQL, no more mixed database landscape."

  - id: no-slo-risk
    type: risk
    title: "No SLOs defined for the public API"
    description: "Without agreed service-level objectives for availability and latency, there is no objective basis for measuring whether the service is meeting user expectations."
    quote: "We don't have SLOs, so we don't know if we're actually meeting customer expectations."

  - id: metrics-schema-risk
    type: risk
    title: "Metrics pipeline has no schema validation, allowing silent data corruption"
    description: "The metrics ingestion pipeline accepts any payload without validation; malformed events are silently dropped or stored with wrong types."
    quote: "The metrics pipeline will accept anything, bad payloads corrupt the data with no warning."

  - id: sdk-version-decision
    type: decision
    title: "Drop v1 SDK at Q3 release and maintain a two-version support window"
    description: "The team decided to drop v1 SDK support at Q3 and maintain a rolling two-version support window."
    quote: "We will drop v1 SDK support at the Q3 release, and maintain a two-version support window."

  - id: enable-export-decision
    type: decision
    title: "Enable document export for Pro and Enterprise customers with 200 MB cap"
    description: "The team enabled document export for all Pro and Enterprise customers and raised the per-export size cap to 200 MB."
    quote: "We enable document export for all Pro and Enterprise customers by end of month."

  - id: audit-trail-oq
    type: open_question
    title: "Must export job logs be included in the customer-facing audit trail?"
    description: "Legal has not confirmed whether export job logs are required in the customer-facing audit trail."
    quote: "We haven't confirmed whether export job logs need to be in the audit trail."

  # --- Easy negatives: completely different domain ---
  - id: hiring-freeze-risk
    type: risk
    title: "Anticipated hiring freeze will block two critical engineering hires"
    description: "A company-wide hiring freeze expected in Q3 would prevent filling two senior engineering roles."
    quote: "If the freeze happens those two roles won't get filled and we'll miss the roadmap."

  - id: flyway-adoption-decision
    type: decision
    title: "Adopt Flyway for all database migrations going forward"
    description: "The team standardised on Flyway as the migration toolchain, replacing ad-hoc SQL scripts."
    quote: "We're standardising on Flyway — the per-service ad-hoc scripts are unmanageable."

  - id: office-lease-oq
    type: open_question
    title: "Should we renew the downtown office lease or relocate?"
    description: "The current downtown office lease expires in eight months and no decision has been made."
    quote: "The lease is up soon — do we renew or start looking for a new space?"

expected_relevant_ids:
  - scan-partitions-action
  - dashboard-staleness-risk
