corpus_id: risk-db-no-backup-retrieves-mitigation-tasks
description: >
  Cross-type (risk→action_item): a risk about missing database backups
  should surface action items about backup configuration, disaster-recovery
  testing, runbook documentation, and cross-region replication, while
  ignoring unrelated DB tasks and completely off-topic items.

tags:
  tier: cross_type
  source_type: risk
  polarity: positive
  difficulty: hard
  keyword_signal: absent
  pool_size: small
  sparse_saves: false

query_node:
  id: no-db-backup
  type: risk
  title: "Production database has no automated backup"
  description: "The production PostgreSQL cluster runs without an automated backup schedule; a disk failure or accidental data deletion would cause permanent data loss."
  quote: "there is no automated backup on the production database, we'd lose everything in a failure"

candidate_nodes:
  # --- Strong positives (near-paraphrase / tightly linked) ---
  - id: configure-db-backup
    type: action_item
    title: "Configure automated daily snapshots for the production database"
    description: "Set up a daily snapshot job for the PostgreSQL cluster with retention of 30 days, stored in a separate availability zone."
    quote: "we need automated daily snapshots, 30-day retention, different AZ"

  - id: test-restore-procedure
    type: action_item
    title: "Run a full database restore drill before the next release"
    description: "Validate the restore procedure from backup snapshots in a staging environment to confirm recovery time meets the RTO target."
    quote: "we have to actually test the restore before we go live, not just assume it works"

  # --- Weak positives (genuinely relevant but loosely linked) ---
  - id: document-recovery-runbook
    type: action_item
    title: "Write a disaster-recovery runbook for database failure scenarios"
    description: "Create step-by-step runbook covering the most likely database failure modes and the recovery actions, including escalation contacts."
    quote: "someone write the DR runbook for the database, engineers don't know what to do in a failure"

  - id: setup-cross-region-replica
    type: action_item
    title: "Set up a cross-region DB replica for disaster recovery"
    description: "Provision a read replica in a secondary AWS region so that in a region-level failure the replica can be promoted to primary without full data loss."
    quote: "we need a cross-region replica so a regional outage doesn't take us down completely"

  # --- Hard negatives (DB-related action items, NOT backup/recovery) ---
  - id: migrate-db-schema-v2
    type: action_item
    title: "Migrate database schema to support v2 API data model"
    description: "Run Alembic migrations to add the new columns and tables required by the v2 API. Schedule during a low-traffic window to minimise lock contention."
    quote: "we need the schema migrations for v2 done before we can cut over"

  - id: add-db-read-replica-reporting
    type: action_item
    title: "Add a DB read replica dedicated to reporting queries"
    description: "Provision a read replica and direct all analytical and reporting queries to it so heavy reads do not impact primary write performance."
    quote: "reporting queries are killing the primary, give them their own replica"

  - id: write-db-performance-guide
    type: action_item
    title: "Write a database performance tuning guide for the engineering team"
    description: "Document index design patterns, query plan reading, and connection pooling best practices so engineers can self-serve on performance issues."
    quote: "let's write up the DB performance tips so people stop asking the same questions"

  - id: enable-db-query-logging
    type: action_item
    title: "Enable query logging on the production database for audit purposes"
    description: "Turn on pg_stat_statements and configure audit logging to capture all DDL and DML statements for the compliance audit trail."
    quote: "audit team needs query logs enabled on production before the review"

  - id: update-db-connection-pool
    type: action_item
    title: "Update database connection pool settings to reduce timeout errors"
    description: "Increase PgBouncer pool size and adjust idle-connection timeouts to resolve the intermittent connection-exhaustion errors seen under peak load."
    quote: "adjust the pool settings, we keep hitting connection limits during peak"

  # --- Easy negatives (completely off-topic) ---
  - id: redesign-dashboard
    type: action_item
    title: "Redesign the analytics dashboard for mobile viewports"
    description: "The existing analytics dashboard is not usable on screens smaller than 1024 px; a mobile-first redesign is required before the public launch."
    quote: "the dashboard looks terrible on phones, redesign it before launch"

  - id: organise-team-lunch
    type: action_item
    title: "Organise a team lunch to welcome new joiners"
    description: "Book a restaurant for a welcome lunch for the three new engineers joining next month."
    quote: "let's do a lunch for the new people, somewhere near the office"

  - id: update-privacy-policy
    type: action_item
    title: "Update the privacy policy page to reflect new data processing"
    description: "The website privacy policy must be updated to document the new third-party analytics integration before it goes live."
    quote: "legal says update the privacy policy before we turn on the new analytics"

  - id: hire-junior-developer
    type: action_item
    title: "Post job listing for a junior backend developer"
    description: "The team is one engineer short for the Q3 roadmap; open a job listing for a junior backend developer with Python and PostgreSQL skills."
    quote: "we need another junior dev, post the listing this week"

  - id: schedule-company-offsite
    type: action_item
    title: "Schedule the annual company offsite for Q4"
    description: "Book a venue and organise travel for the full-company offsite, targeting a two-day event in October."
    quote: "let's lock in the Q4 offsite before the good venues are gone"

expected_relevant_ids:
  - configure-db-backup
  - test-restore-procedure
  - document-recovery-runbook
  - setup-cross-region-replica
