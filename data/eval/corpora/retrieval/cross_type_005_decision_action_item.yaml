corpus_id: decision-deprecate-v1-api-retrieves-migration-tasks
description: >
  Cross-type (decision→action_item): a decision to deprecate the v1 API
  and migrate clients to v2 should surface action items about notifying
  customers, adding deprecation headers, writing a migration guide, and
  auditing internal v1 callers, while ignoring API-related tasks unrelated
  to v1 deprecation and completely off-topic items.

tags:
  tier: cross_type
  source_type: decision
  polarity: positive
  difficulty: hard
  keyword_signal: absent
  pool_size: small
  sparse_saves: false

query_node:
  id: deprecate-v1-api
  type: decision
  title: "Deprecate the v1 REST API and migrate clients to v2"
  description: "The v1 REST API will be officially deprecated immediately, with a six-month sunset window. All clients must migrate to v2 before the removal date."
  quote: "v1 is deprecated as of today, we remove it in six months"

candidate_nodes:
  # --- Strong positives (near-paraphrase / tightly linked) ---
  - id: notify-v1-customers
    type: action_item
    title: "Send deprecation notice to all registered v1 API consumers"
    description: "Draft and send an email to every account using v1 endpoints explaining the timeline, migration guide link, and support contacts."
    quote: "someone draft the deprecation email and send it to all v1 customers this week"

  - id: add-deprecation-headers
    type: action_item
    title: "Add Deprecation and Sunset HTTP headers to all v1 responses"
    description: "Update the v1 API gateway configuration to inject Deprecation and Sunset headers on every response so clients can programmatically detect the sunset date."
    quote: "add the Deprecation and Sunset headers to v1 responses so clients get a machine-readable warning"

  # --- Weak positives (genuinely relevant but loosely linked) ---
  - id: create-migration-guide
    type: action_item
    title: "Write a v1-to-v2 migration guide in the developer docs"
    description: "Produce a step-by-step migration guide covering all breaking changes between v1 and v2, including changed endpoint paths, renamed fields, and new auth requirements."
    quote: "we need a migration guide in the docs before the notice goes out"

  - id: audit-internal-v1-callers
    type: action_item
    title: "Audit which internal services still call the v1 API"
    description: "Run a query across service logs and dependency graphs to identify every internal caller of v1 endpoints so they can be prioritised for migration before the sunset date."
    quote: "we need to know which of our own services are still on v1 before we pull the plug"

  # --- Hard negatives (API work NOT about v1 deprecation) ---
  - id: add-openapi-spec-v2
    type: action_item
    title: "Add OpenAPI specification for all v2 endpoints"
    description: "Write and publish an OpenAPI 3.1 spec for the v2 API so that client SDK generation and API portal documentation can be automated."
    quote: "v2 needs a proper OpenAPI spec, we can't keep maintaining the docs by hand"

  - id: setup-api-load-testing
    type: action_item
    title: "Set up an API load testing suite for the v2 endpoints"
    description: "Configure a k6 load testing suite that exercises the critical v2 API paths under peak expected traffic to establish performance baselines."
    quote: "we need load tests for v2 before launch so we know what it can actually handle"

  - id: write-api-auth-guide
    type: action_item
    title: "Write an API authentication guide for third-party developers"
    description: "Produce a developer-facing guide explaining how to obtain API credentials, exchange tokens, and handle refresh flows for the v2 API."
    quote: "external developers keep asking how auth works, write it up properly"

  - id: configure-api-rate-limiting-v2
    type: action_item
    title: "Configure API rate limiting tiers for v2 consumers"
    description: "Define and implement rate limiting tiers in the API gateway for free, standard, and enterprise v2 consumers to protect backend capacity."
    quote: "we need rate limiting on v2 before we open it to the public"

  - id: add-request-validation-middleware
    type: action_item
    title: "Add request validation middleware to the v2 API gateway"
    description: "Introduce a validation layer that rejects malformed requests at the gateway before they hit the backend services, reducing error-handling boilerplate in individual services."
    quote: "validate requests at the gateway, services shouldn't have to handle bad input themselves"

  # --- Easy negatives (completely off-topic) ---
  - id: schedule-offsite
    type: action_item
    title: "Schedule the Q3 team offsite"
    description: "Book venue and travel for the Q3 team offsite, targeting the second week of August."
    quote: "someone book the offsite for August, second week works for most people"

  - id: update-runbook
    type: action_item
    title: "Update the on-call runbook with new escalation contacts"
    description: "The on-call runbook still lists people who have left the team; it needs to be updated with current escalation contacts before the next release."
    quote: "the runbook has old names, update it before we go live"

  - id: organise-team-lunch
    type: action_item
    title: "Organise a team lunch to welcome new joiners"
    description: "Book a restaurant for a welcome lunch for the three new engineers joining next month."
    quote: "let's do a lunch for the new people, somewhere near the office"

  - id: hire-junior-developer
    type: action_item
    title: "Post job listing for a junior backend developer"
    description: "The team is one engineer short for the Q3 roadmap; open a job listing for a junior backend developer with Python and PostgreSQL skills."
    quote: "we need another junior dev, post the listing this week"

  - id: refresh-company-website
    type: action_item
    title: "Refresh the company website copy and visuals for the rebrand"
    description: "Update homepage copy, product screenshots, and brand colours across the marketing website to reflect the new brand identity."
    quote: "the website still has the old brand, update it before the announcement goes out"

expected_relevant_ids:
  - notify-v1-customers
  - add-deprecation-headers
  - create-migration-guide
  - audit-internal-v1-callers
