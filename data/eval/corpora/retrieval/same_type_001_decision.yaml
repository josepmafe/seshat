corpus_id: decision-k8s-retrieves-container-strategy
description: >
  Same-type (decision→decision): decision to adopt Kubernetes should surface
  prior KB decisions about container orchestration and deployment strategy
  (strong positives), plus a related decision about container image standards
  (weak positive), while not surfacing same-domain architecture decisions about
  databases, frontend, monorepo, API gateway, or auth (hard negatives), nor
  completely off-topic decisions about office logistics, hiring, or branding
  (easy negatives). 15 candidates, 4 expected relevant.
tags:
  tier: same_type
  source_type: decision
  polarity: positive
  difficulty: medium

query_node:
  id: adopt-kubernetes
  type: decision
  title: "Adopt Kubernetes for container orchestration"
  description: "The team decided to use Kubernetes as the container orchestration platform for all production workloads, replacing the current manually-managed VM fleet."
  quote: "we're going with Kubernetes, it's the right choice for our scale"

candidate_nodes:
  # --- Strong positives (~2-3): near-paraphrase or very tightly semantically linked ---
  - id: container-strategy
    type: decision
    title: "Standardise on containerised deployments with an orchestration layer"
    description: "All services must be packaged as containers and managed by a container orchestration platform to enable consistent deployments and auto-scaling."
    quote: "everything runs in containers from here on, and an orchestrator manages it all"

  - id: deprecate-vm-fleet
    type: decision
    title: "Deprecate manually-managed VM fleet by end of year"
    description: "All manually-provisioned virtual machines will be decommissioned in favour of container-based workloads, with a hard deadline at year-end."
    quote: "the VM fleet goes away by December, no exceptions"

  # --- Weak positives (~1-2): genuinely relevant but more loosely linked ---
  - id: standardise-container-image-base
    type: decision
    title: "Standardise on a minimal Alpine-based container image for all services"
    description: "All service container images must use a minimal Alpine Linux base to reduce image size, attack surface, and pull latency across the cluster."
    quote: "every service uses Alpine as the base image, no fat distributions allowed"

  - id: adopt-helm-for-packaging
    type: decision
    title: "Use Helm charts as the standard packaging format for Kubernetes workloads"
    description: "All Kubernetes workloads must be packaged and deployed via Helm charts to enforce consistent templating, versioning, and rollback capability."
    quote: "Helm is how we ship to Kubernetes, everyone writes charts from now on"

  # --- Hard negatives (~4-5): same domain/type, plausibly related at first glance ---
  - id: use-postgresql
    type: decision
    title: "Use PostgreSQL as the primary relational database"
    description: "PostgreSQL is selected as the sole relational persistence layer for all services, replacing the mix of MySQL and Oracle instances."
    quote: "we're standardising on PostgreSQL, no more mixed database landscape"

  - id: adopt-react-frontend
    type: decision
    title: "Adopt React for the customer-facing frontend"
    description: "The frontend team will use React as the component framework for all new customer-facing pages."
    quote: "frontend goes React, we need a modern component model"

  - id: keep-monorepo
    type: decision
    title: "Keep a monorepo structure for all service code"
    description: "All microservice source code will remain in a single Git monorepo to simplify cross-service changes and dependency management."
    quote: "we keep the monorepo, splitting repos would cause more pain than it solves"

  - id: api-gateway-pattern
    type: decision
    title: "Introduce an API gateway for all external traffic"
    description: "All inbound external requests must route through a centralised API gateway responsible for auth, rate-limiting, and routing."
    quote: "everything from outside goes through the gateway first"

  - id: centralise-auth-service
    type: decision
    title: "Build a centralised authentication and authorisation service"
    description: "A dedicated internal auth service will own all token issuance, validation, and permission checks, replacing ad-hoc auth logic scattered across microservices."
    quote: "one auth service, all services delegate to it, no more per-service auth code"

  - id: adopt-graphql-api
    type: decision
    title: "Adopt GraphQL for the internal data API layer"
    description: "The platform team decided to replace internal REST endpoints with a GraphQL schema to allow flexible querying and reduce over-fetching between services."
    quote: "we're switching internal APIs to GraphQL, REST is too rigid for our query patterns"

  # --- Easy negatives (~4-5): completely different domain/topic ---
  - id: renew-office-lease-downtown
    type: decision
    title: "Renew downtown office lease for three more years"
    description: "The leadership team decided to renew the current downtown office lease for a further three years rather than relocating to a cheaper suburb."
    quote: "we're staying downtown, the lease gets renewed for three years"

  - id: freeze-external-hiring
    type: decision
    title: "Freeze external hiring for the remainder of the fiscal year"
    description: "No new external hires will be made until the end of the fiscal year; open headcount is placed on hold pending budget reforecast."
    quote: "hiring is frozen until year end, no exceptions"

  - id: switch-crm-platform
    type: decision
    title: "Replace legacy CRM with Salesforce"
    description: "The sales team's legacy CRM will be migrated to Salesforce by the end of Q2 to unify customer data and improve reporting."
    quote: "we're moving to Salesforce, the old CRM is being retired"

  - id: redesign-company-logo
    type: decision
    title: "Commission a full company logo and brand identity redesign"
    description: "The executive team approved commissioning an external agency to redesign the company logo and visual identity as part of the upcoming rebrand."
    quote: "we're getting a new logo, the rebrand kicks off next quarter"

  - id: rename-engineering-team
    type: decision
    title: "Rename the 'Platform' team to 'Infrastructure Engineering'"
    description: "The team previously known as Platform will be officially renamed Infrastructure Engineering to better reflect its scope and attract candidates."
    quote: "Platform becomes Infrastructure Engineering from next month"

expected_relevant_ids:
  - container-strategy
  - deprecate-vm-fleet
  - standardise-container-image-base
  - adopt-helm-for-packaging
