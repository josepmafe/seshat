description: >
  Boundary: the team raises an unresolved question about which A/B testing approach to adopt
  and assigns a named person who explicitly claims the action item will answer it. Both the
  Open Question and the Action Item must be extracted — the assignment creates the resolution
  path but does not close the question. Models that treat explicit acceptance language
  ("That comparison will answer it") as absorption will drop the OQ spuriously.

tags:
  tier: boundary
  difficulty: hard
  focus: [open_question, action_item]
  detail: "OQ survives when assignee explicitly claims the AI will answer it"

transcript: |
  Before we commit to the new experiment roadmap, we need to sort out which A/B testing
  approach we're going with. The question is whether we buy a third-party platform or
  build the assignment and bucketing layer in-house. Both have real trade-offs and we
  haven't evaluated them properly yet.
  Right — vendor cost is predictable but we lose flexibility on custom metrics. Building
  in-house gives us full control but could take two sprints just to get a reliable
  bucketing service.
  We shouldn't decide without numbers. We need an actual cost and effort estimate before
  we can pick a direction.
  Agreed, we can't commit to the experiment roadmap until that question is answered.
  Omar, can you pull together a proper comparison — vendor pricing, estimated build effort,
  and a recommendation — by the end of next week? That should give us what we need to close this.
  Yes, absolutely. That comparison will answer it. I'll have a written recommendation ready
  by next Friday.

