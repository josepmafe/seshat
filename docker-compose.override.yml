services:
  migrate:
    volumes:
      - ./alembic:/app/alembic
      - ./src:/app/src

  seshat-api:
    volumes:
      - ./src:/app/src
      - ${USERPROFILE}/.aws:/root/.aws:ro
    environment:
      - AWS_PROFILE=ClaudeCode
      - AWS_ACCESS_KEY_ID=
      - AWS_SECRET_ACCESS_KEY=
    command: >
      uv run --no-sync seshat api --reload
